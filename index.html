<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Veux-tu être ma copine ?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="paper-texture"></div>

  <svg class="sprite-defs" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="heart-shape" viewBox="0 0 32 29">
        <path d="M16 27.5C13.6 25.3 2 15.6 2 8.7C2 4.1 5.7 1 10 1C13 1 15.4 3 16 5.8C16.6 3 19 1 22 1C26.3 1 30 4.1 30 8.7C30 15.6 18.4 25.3 16 27.5Z"/>
      </symbol>
    </defs>
  </svg>

  <div class="bg-hearts" id="bgHearts"></div>

  <section class="cover" id="coverScreen">
    <div class="cover-heart" id="coverHeart">
      <svg viewBox="0 0 32 29" class="heart-icon"><use href="#heart-shape"></use></svg>
    </div>
    <p class="cover-text">Clique pour commencer 💕</p>
  </section>

  <audio id="bgMusic" src="music/song.mp3" preload="auto" loop playsinline webkit-playsinline></audio>
  <button class="sound-toggle" id="soundToggle" aria-label="Couper le son" hidden>🔊</button>

  <main class="stage">

    <section class="container" id="mainContent" hidden>
      <h1 class="title" id="title">Veux-tu être ma copine, Anahit ? 💕</h1>
      <p class="subtitle" id="subtitleEl">(prends ton temps, mais pas trop 😌)</p>
      <div class="buttons">
        <button class="btn yes" id="yesBtn">Oui</button>
        <button class="btn no" id="noBtn">Non</button>
      </div>
    </section>

    <section class="game-screen" id="gamePop" hidden>
      <h2 class="game-title">Mini-jeu : pop les cœurs</h2>
      <p class="game-sub">Éclate-les tous avant de continuer.</p>
      <p class="game-counter" id="popCounter">14 cœurs à éclater</p>
      <div id="popArea"></div>
    </section>

    <section class="success" id="successScreen" hidden>
      <h1 class="big-message">OUIII T'AS ACCEPTÉ !!! 🎉❤️</h1>
    </section>

  </main>

  <p class="signature">avec amour ✦</p>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
